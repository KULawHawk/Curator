# =============================================================================
# .github/dependabot.yml   (v1.7.148 — pip ecosystem expansion)
#
# Automated dependency updates for both GitHub Actions and pip ecosystems.
#
# Background
# ----------
# v1.7.67 manually bumped actions/checkout, actions/setup-python, and
# actions/upload-artifact to versions running on Node.js 24, 8 months
# after deprecation and 3 weeks before forcing. v1.7.71 introduced the
# github-actions ecosystem watching to eliminate that manual-tracking gap.
#
# v1.7.148 adds pip ecosystem watching, completing the deferred Round 1
# item. The original deferral rationale ("Curator's own version
# compatibility surface is large; ad-hoc pip upgrades have caused
# regressions before") is now addressed by:
#   * 146 ships and 55 modules at 100% line + branch coverage
#   * 5 multi-ship arcs closed under the apex-accuracy doctrine
#   * The 9-cell CI matrix (windows-latest x {3.11, 3.12, 3.13}) catches
#     regressions before merge
# In short: we now have enough test signal to absorb dependabot pip PR
# churn without losing track of regressions.
#
# Scope
# -----
# This config watches:
#   * github-actions (Curator's CI workflows) — weekly, grouped
#   * pip (pyproject.toml dependencies + [all] extras) — weekly, grouped
#     into production vs dev so updates are reviewable separately
#
# Schedule
# --------
# Weekly for both. Daily would create noise without value; most
# packages release updates every few months at most.
#
# Auto-merge
# ----------
# Not configured here. Dependabot PRs run through the normal 9-cell
# matrix; passing CI is the gate. The pre-push hook + ci_diag.ps1
# tooling support manual review/merge by maintainers.
# =============================================================================

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Chicago
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - github-actions
    # Group all GitHub Actions bumps into one PR per week. Reduces PR
    # churn and lets the matrix exercise multiple bumps at once (which
    # is the same way v1.7.67 was tested manually).
    groups:
      github-actions-all:
        patterns:
          - "*"
    # Cap concurrent open PRs to 5 (default 10). Keeps the queue clean
    # even if multiple bumps land in different weeks.
    open-pull-requests-limit: 5

  # ---------------------------------------------------------------------------
  # Pip ecosystem (Python dependencies in pyproject.toml)
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: America/Chicago
    commit-message:
      prefix: "deps"
      include: scope
    labels:
      - dependencies
      - python
    # Group updates by category so production-dep updates land
    # separately from dev-dep updates. Production groups land first
    # in review; dev groups can sometimes be auto-mergeable on green CI.
    groups:
      production-deps:
        dependency-type: production
      development-deps:
        dependency-type: development
    open-pull-requests-limit: 5
