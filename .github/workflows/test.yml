# =============================================================================
# .github/workflows/test.yml   (v1.7.50)
#
# Continuous integration: run the full pytest baseline on every push to main
# and every pull request targeting main. Catches regressions before they
# land, so "green baseline" stops being a claim and becomes a fact.
#
# Design choices
# --------------
# * Windows runner only for v1: Curator is Windows-first; runs-on
#   windows-latest matches dev environment exactly. Cross-platform matrix
#   (ubuntu-latest, macos-latest) is a future ship -- adds ~3x runner-minutes
#   for marginal coverage gain when the project's deployment is Windows.
#
# * Python version matrix [3.11, 3.12, 3.13] (v1.7.50): pyproject.toml
#   claims requires-python = ">=3.11", but we'd only been testing on 3.13.
#   The matrix runs three parallel jobs -- one per Python version -- so
#   any 3.11- or 3.12-specific breakage surfaces immediately in CI, not
#   after a user files an issue. ``fail-fast: false`` is critical: if
#   3.11 breaks, we still want to know whether 3.12 also breaks
#   (might be the same issue, might be different).
#
# * Full extras profile [all]: matches what setup_dev_env.py defaults to,
#   so CI exercises the same install path a real contributor uses.
#
# * QT_QPA_PLATFORM=offscreen: lets the GUI test suite (~24 tests) run
#   headless. Already proven locally; same setting the local detached
#   pytest uses.
#
# * --timeout=120 per-test: catches hangs without killing the whole run
#   on a single slow test.
#
# * 15-minute job timeout: the baseline runs in ~3-4 min locally; CI runs
#   are usually a bit slower (cold pip cache first time, cold Qt startup).
#   15 min has 5x headroom. With the matrix, each Python version runs in
#   parallel so wall-clock stays under 15 min even with 3 versions.
#
# * Pip cache via setup-python: speeds up repeat runs by re-using the
#   downloaded wheels from the previous run. ``actions/setup-python``
#   automatically keys the cache by Python version, so each matrix entry
#   gets its own cache without manual key construction.
#
# * NO_COLOR=1 (v1.7.45): forces Rich/Typer to emit plain-text help
#   output in CI. Without this, Rich wraps option names like ``--apply``
#   in ANSI escape sequences, breaking substring assertions in tests.
# =============================================================================

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives.
# Saves CI minutes when developers push fix-ups rapidly. The matrix entries
# share this group, so a new push cancels ALL in-progress Python-version
# jobs together (correct: they're all stale once a new commit lands).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 15

    # v1.7.50: matrix on Python version. fail-fast: false lets all three
    # versions complete even if one fails -- critical for diagnosing
    # whether a failure is version-specific or universal.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Curator (full extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
          NO_COLOR: "1"
        run: |
          pytest tests/ -q --tb=line --timeout=120
