# =============================================================================
# .github/workflows/test.yml   (v1.7.77)
#
# Continuous integration: run the full pytest baseline on every push to main
# and every pull request targeting main. Catches regressions before they
# land, so "green baseline" stops being a claim and becomes a fact.
#
# v1.7.77: accepted Dependabot PR #1's grouped bump after CI verified all
# 9 cells GREEN on the proposed versions.
#   - actions/checkout: v5 -> v6 (released Oct 2025; Node 24 native)
#   - actions/upload-artifact: v6 -> v7 (released Apr 2026; Node 24 native)
# The v1.7.67 conservative choice to use checkout@v5 was based on
# theoretical credential-persistence breaking changes in v6; Curator's
# CI does not use credentials post-checkout (no submodules, no push, no
# auth-using actions in subsequent steps), so the change is safe. PR #1's
# 9/9 GREEN run on fa16240 confirmed this empirically.
#
# v1.7.67 (history): bumped all actions/* from Node-20-era versions:
#   - actions/checkout: v4 -> v5 (Node 24, released Aug 2025)
#   - actions/setup-python: v5 -> v6 (Node 24, released Sept 2025)
#   - actions/upload-artifact: v4 -> v6 (Node 24, released Dec 2025)
# GitHub deprecated Node.js 20 on 2025-09-19 and forced Node.js 24 on
# 2026-06-02. Node.js 20 will be removed entirely on 2026-09-16.
#
# Design choices
# --------------
# * **OS matrix [windows-latest] (v1.7.84 — narrowed)**:
#   Curator was originally Windows-first; v1.7.54 expanded to the full
#   3 OS x 3 Python = 9-cell matrix to validate cross-platform code paths.
#   v1.7.84 narrowed scope back to Windows-only per Jake's directive
#   ("suspend worrying about macos or linux support"). The cross-platform
#   code in services/safety.py is preserved on disk but pragma-marked;
#   see docs/PLATFORM_SCOPE.md for the full set-aside register and the
#   step-by-step resume path. The shrunk matrix saves ~6 CI minutes per
#   push and reduces matrix-cell debugging surface from 9 to 3.
#
# * Python version matrix [3.11, 3.12, 3.13] (v1.7.50): pyproject.toml
#   claims requires-python = ">=3.11". The matrix runs in parallel; any
#   version-specific breakage surfaces immediately.
#
# * **Combined matrix is 1 OS x 3 Python = 3 jobs (v1.7.84)**. ``fail-fast: false``
#   is still useful: if one Python version fails, the others still complete
#   so we can diagnose whether it's version-specific or universal. Previously
#   this was 9 cells (3 OS x 3 Python).
#
# * Full extras profile [all]: matches what setup_dev_env.py defaults to,
#   so CI exercises the same install path a real contributor uses.
#
# * **Linux requires Qt offscreen deps (v1.7.54)**: PySide6's offscreen
#   platform plugin needs libegl1 + libgl1 on Ubuntu. macOS and Windows
#   ship these via Qt's bundled runtime. The "Install Qt offscreen deps"
#   step runs only on Linux via ``if: runner.os == 'Linux'``.
#
# * QT_QPA_PLATFORM=offscreen: lets the GUI test suite (~24 tests) run
#   headless on all three platforms.
#
# * --timeout=120 per-test: catches hangs without killing the whole run
#   on a single slow test.
#
# * 15-minute job timeout: the baseline runs in ~3-4 min locally; CI runs
#   are usually a bit slower (cold pip cache first time, cold Qt startup).
#   15 min has 5x headroom. Each matrix entry runs independently in
#   parallel, so wall-clock stays under 15 min even with 9 entries.
#
# * Pip cache via setup-python: speeds up repeat runs by re-using the
#   downloaded wheels from the previous run. ``actions/setup-python``
#   automatically keys the cache by Python version AND runner OS, so
#   each matrix cell gets its own cache without manual key construction.
#
# * NO_COLOR=1 (v1.7.45): forces Rich/Typer to emit plain-text help
#   output in CI. Without this, Rich wraps option names like ``--apply``
#   in ANSI escape sequences, breaking substring assertions in tests.
# =============================================================================

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch when a new push arrives.
# Saves CI minutes when developers push fix-ups rapidly. The matrix entries
# share this group, so a new push cancels ALL in-progress jobs together
# (correct: they're all stale once a new commit lands).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    # v1.7.84: scope narrowed to Windows-only (was 3 OS x 3 Python = 9 cells).
    # Non-Windows code is preserved on disk and pragma-marked in safety.py;
    # see docs/PLATFORM_SCOPE.md for the resume path. fail-fast still false
    # so we see all 3 Python versions independently.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        # v1.7.77: bumped from @v5 to @v6 (Dependabot PR #1 grouped bump).
        # CI verified 9/9 GREEN on fa16240 before merge. v6 separates
        # credential persistence to a separate file by default; Curator
        # does not use credentials post-checkout, so the change is safe.
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        # v1.7.67: bumped from @v5 (Node 20, deprecated) to @v6 (Node 24).
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      # v1.7.54: Linux needs system Qt offscreen libraries. PySide6's
      # bundled runtime doesn't ship libegl/libgl on Ubuntu; without
      # these the offscreen platform plugin fails to initialize and
      # every GUI test errors. macOS and Windows have these via their
      # OS-bundled Qt runtimes.
      - name: Install Qt offscreen deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Curator (full extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run pytest
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
          NO_COLOR: "1"
          # v1.7.61: force wide terminal so Rich/Typer's --help output
          # doesn't wrap option names like '--apply' across line boundaries
          # with embedded ANSI codes. NO_COLOR=1 (v1.7.45) disables colors
          # but not the table-wrapping layout. On Linux/macOS CI runners
          # the terminal width defaults differently than Windows, causing
          # 3 tests in test_cli_*.py to fail with split substring matches.
          COLUMNS: "200"
        run: |
          pytest tests/ -q --tb=line --timeout=120 --cov=curator --cov-report=term --cov-report=xml

      # v1.7.51: upload coverage.xml as a CI artifact so it's downloadable
      # from the run summary page. v1.7.54: artifact name includes BOTH
      # Python version AND OS to avoid collision across the 9 matrix cells.
      # Codecov upload is intentionally not wired up here -- requires
      # repo-level secret setup and isn't strictly needed for the basic
      # coverage signal.
      - name: Upload coverage report
        if: always()  # upload even when tests fail -- coverage diagnoses
        # v1.7.77: bumped from @v6 to @v7 (Dependabot PR #1 grouped bump).
        # CI verified 9/9 GREEN on fa16240 before merge.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 30
